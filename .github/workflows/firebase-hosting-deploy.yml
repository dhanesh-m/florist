# Deploy Next.js (Firebase Web Frameworks) to Firebase Hosting.
# One-time: firebase login:ci → add FIREBASE_TOKEN to repo secrets.
# Optional: set NEXT_PUBLIC_SITE_URL etc. as GitHub Actions secrets if the workflow passes env to deploy
# and map them below, or configure them in Firebase Console for the framework backend.

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Firebase Hosting
        run: npx firebase deploy --only hosting --project floral-doctor --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          # Uncomment and add matching repository secrets if your build/server needs them at deploy time:
          # FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
